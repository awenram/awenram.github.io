<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Arlo Wengert-Ramos</title>
  <style>
    body {
      display: flex;
      justify-content: center;
      align-items: center;
      height: 100vh;
      background: #f0e5c9;
    }

    .wrapper {
      position: relative;
      width: 500px;
      height: 500px;
      display: flex;
      justify-content: center;
      align-items: center;
    }

    .center-text {
      position: absolute;
      z-index: 2;
      font-size: 1.8rem;
      font-weight: bold;
      text-align: center;
    }

    .wrapper img {
      position: absolute;
      width: 100px;
      height: 100px;
      object-fit: cover;
      border-radius: 12px;
      box-shadow: 0 4px 8px rgba(0,0,0,0.2);
    }

/* Scattered positions */
    .img1 { top: 40px; left: 80px; }
    .img2 { top: 20px; right: 100px; }
    .img3 { top: 180px; right: 40px; }
    .img4 { top: 200px; left: 40px; }
    .img5 { bottom: 180px; left: 60px; }
    .img6 { bottom: 200px; right: 60px; }
    .img7 { bottom: 60px; left: 160px; }
    .img8 { bottom: 40px; right: 160px; }
  </style>
</head>
<body>
  <div class="wrapper">
    <div class="center-text">Arlo details</div>

    <img src="\images\placeholder.jpg" alt="photo1" class="img1">
    <img src="\images\placeholder.jpg" alt="photo2" class="img2">
    <img src="\images\placeholder.jpg" alt="photo3" class="img3">
    <img src="\images\placeholder.jpg" alt="photo4" class="img4">
    <img src="\images\placeholder.jpg" alt="photo5" class="img5">
    <img src="\images\placeholder.jpg" alt="photo6" class="img6">
    <img src="\images\placeholder.jpg" alt="photo7" class="img7">
    <img src="\images\placeholder.jpg" alt="photo8" class="img8">
  </div>
</body>
</html>
