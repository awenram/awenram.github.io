<!-- page specific stuff here -->
    <main>
        <div>
            <section class="flex-column">
                <h1>Get In Touch</h1>
            </section>
        </div>
        <div class="content-wrapper">
            <div class="left-column">
                <p>Interested in a collaboration or want to discuss something? Enter your information or reach out to me, and I'll get back to you ASAP.</p>
                <p>***</p>
                <p><i class="fa-regular fa-envelope"> </i><a href="mailto:awengert@uncc.edu"> awengert@uncc.edu</a></p> 
                <p><i class="fa-solid fa-phone"> </i><a href="tel:9801235689"> (980)123-5689</a></p>        
            </div>
            <div class="right-column">
                <form>
                    <div>
                        <label for="first-name">First Name</label>
                        <input type="text" id="first-name" required>
                    </div>
    
                    <div>
                        <label for="last-name">Last Name</label>
                        <input type="text" id="last-name" required>
                    </div>
                    <div>
                        <label for="email">Email</label>
                        <input type="email" name="email" id="email" required>
                    </div>
                    <div>
                        <label for="phone">Phone</label>
                        <input type="tel" id="phone" required>
                    </div>
                    <div class="span">
                        <label for="request">Note</label>
                        <textarea id="request" cols="20" rows="5"></textarea>
                    </div>
                    <div class="span"><input type="submit" value="Submit"></div>
                </form>
            </div>
        </div>
    </main>
